version: 2
updates:
  # npm dependencies
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      tailwind:
        patterns: ["tailwind*", "tw-*"]
      tiptap:
        patterns: ["@tiptap/*"]
      shadcn-deps:
        patterns: ["class-variance-authority", "clsx", "tailwind-merge"]

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
